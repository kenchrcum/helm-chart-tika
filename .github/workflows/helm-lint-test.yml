name: Lint and Test Helm Chart

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Run helm lint
        run: helm lint tika/

      - name: Template — default values
        run: |
          helm template test tika/ > /dev/null
          echo "✓ Default template renders"

      - name: Template — ci-default
        run: |
          helm template test tika/ -f tika/tests/ci-default.yaml > /dev/null
          echo "✓ ci-default renders"

      - name: Template — ci-minimal-image
        run: |
          helm template test tika/ -f tika/tests/ci-minimal-image.yaml > /dev/null
          echo "✓ ci-minimal-image renders"

      - name: Template — ci-custom-config
        run: |
          helm template test tika/ -f tika/tests/ci-custom-config.yaml > /dev/null
          echo "✓ ci-custom-config renders"

      - name: Template — ci-full-features
        run: |
          helm template test tika/ -f tika/tests/ci-full-features.yaml > /dev/null
          echo "✓ ci-full-features renders"

      - name: Validate values schema
        run: |
          helm template test tika/ --set replicaCount=invalid > /dev/null 2>&1 \
            && echo "ERROR: Schema validation should have rejected invalid value" \
            && exit 1 \
            || echo "✓ Schema validation rejects invalid values"
