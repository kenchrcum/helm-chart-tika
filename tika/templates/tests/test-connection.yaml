apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "tika.fullname" . }}-test-connection"
  labels:
    {{- include "tika.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['{{ include "tika.fullname" . }}:{{ .Values.service.port }}/version']
  restartPolicy: Never
