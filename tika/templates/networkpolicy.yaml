{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "tika.fullname" . }}
  labels:
    {{- include "tika.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "tika.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- toYaml .Values.networkPolicy.policyTypes | nindent 4 }}
  {{- if contains "Ingress" (.Values.networkPolicy.policyTypes | join ",") }}
  ingress:
    {{- if .Values.networkPolicy.ingress.ingressControllers }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingress.ingressNamespace | quote }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: http
    {{- end }}
    {{- if .Values.networkPolicy.ingress.monitoring }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingress.monitoringNamespace | quote }}
      ports:
        - protocol: TCP
          port: http
    {{- end }}
    {{- if .Values.networkPolicy.namespaceIsolation }}
    - from:
        - podSelector: {}
          namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.namespaceLabel.key }}: {{ .Release.Namespace | quote }}
      ports:
        - protocol: TCP
          port: http
    {{- end }}
  {{- end }}
  {{- if contains "Egress" (.Values.networkPolicy.policyTypes | join ",") }}
  egress:
    # Allow DNS for service discovery
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound traffic within the same namespace
    - to:
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.namespaceLabel.key }}: {{ .Release.Namespace | quote }}
  {{- end }}
{{- end }}
