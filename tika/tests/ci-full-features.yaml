# CI values: full feature set
# Tests all production features enabled simultaneously:
# ingress, HPA, PDB, ServiceMonitor, PodMonitor, NetworkPolicy, tikaExtras.
# Verifies that all conditional templates render correctly together.
replicaCount: 2

tika:
  fullImage: true
  logLevel: "info"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  hosts:
    - host: tika.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tika-tls
      hosts:
        - tika.example.com

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  labels:
    release: prometheus

podMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  labels:
    release: prometheus

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress
  namespaceIsolation: true
  namespaceLabel:
    key: "kubernetes.io/metadata.name"
  ingress:
    ingressControllers: true
    ingressNamespace: "ingress-nginx"
    monitoring: true
    monitoringNamespace: "monitoring"

tikaExtras:
  enabled: true
  type: emptyDir
  emptyDir:
    sizeLimit: 500Mi

extraEnv:
  - name: MY_CUSTOM_VAR
    value: "test-value"

extraVolumes:
  - name: extra-config
    configMap:
      name: my-extra-config

extraVolumeMounts:
  - name: extra-config
    mountPath: /extra-config
    readOnly: true

initContainers:
  - name: init-demo
    image: busybox:1.36
    command: ["sh", "-c", "echo 'Init container ran'"]

sidecars:
  - name: sidecar-demo
    image: busybox:1.36
    command: ["sh", "-c", "sleep infinity"]

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9998"

podLabels:
  environment: ci
  tier: backend

nodeSelector:
  kubernetes.io/os: linux

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: tika
